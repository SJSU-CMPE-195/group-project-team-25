name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
      - run: pip install flake8 black
      - name: Check formatting
        run: black --check src/ tests/
      - name: Lint
        run: flake8 src/ tests/ --max-line-length=121 --extend-ignore=E203,E402 --exit-zero