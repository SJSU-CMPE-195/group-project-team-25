name: CI

on:
  push:
  pull_request:

permissions:
  contents: write

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
      - run: pip install flake8 black
      - name: Check formatting
        run: black --check src/ tests/
      - name: Lint
        run: flake8 src/ tests/ --max-line-length=121 --extend-ignore=E203,E402 --exit-zero

  frontend-unit-tests:
    runs-on: ubuntu-latest
    needs: lint
    defaults:
      run:
        working-directory: src/TicketMonarch/frontend
    steps:
      - uses: actions/checkout@v4
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'
      - name: Install Dependencies
        run: npm install
      - name: Run tests with coverage
        run: npm test
      - name: Generate coverage badge
        uses: ImBIOS/lcov-coverage-badge@v1
        with:
          file: docs/evaluation/coverage-report/lcov.info
          output_file: coverage.svg
      - name: Commit coverage badge
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add ../../../coverage.svg
          git diff --cached --quiet || git commit -m "Update coverage badge"
          git push
      - name: Upload HTML coverage report
        uses: actions/upload-artifact@v4
        with:
          name: coverage-report
          path: docs/evaluation/coverage-report

  backend-unit-tests:
    runs-on: ubuntu-latest
    needs: lint
    steps:
    - uses: actions/checkout@v4
    - uses: actions/setup-python@v5
      with:
        python-version: '3.12'
    - name: Install dependencies
      run: |
        pip install -r src/TicketMonarch/backend/requirements.txt
        pip install -r src/TicketMonarch/backend/tests/requirements.txt
    - name: Run tests with coverage
      env:
        PYTHONPATH: src
      run: pytest  --cov=src/TicketMonarch/backend --cov-report=term-missing